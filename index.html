<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Lista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Ocultar flechas en los inputs numéricos para un diseño más limpio */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
            appearance: textfield;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 flex flex-col items-center relative overflow-hidden">

    <main class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6 flex flex-col h-[90vh] z-10">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                🛒 Mi Lista
            </h1>
            <button onclick="limpiarLista()" class="text-sm text-red-500 hover:text-red-700 font-medium px-2 py-1">
                Borrar selección
            </button>
        </div>

        <div id="lista-productos" class="flex-1 overflow-y-auto space-y-3 pr-1 pb-4">
            </div>

        <div class="pt-4 border-t border-gray-100 mt-auto">
            <button onclick="copiarAlPortapapeles()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-xl shadow-lg transition-all active:scale-[0.98] flex justify-center items-center gap-2">
                📋 Copiar para compartir
            </button>
        </div>
    </main>

    <div id="toast" class="fixed bottom-24 sm:bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-xl shadow-2xl font-medium flex items-center gap-2 opacity-0 pointer-events-none transition-all duration-300 transform translate-y-4 z-50 whitespace-nowrap">
        <span id="toast-icon" class="text-lg">✅</span>
        <span id="toast-message">¡Lista copiada!</span>
    </div>

    <script>
        // --- 1. TU LISTA DE PRODUCTOS ---
        const productosBase = [
    "Aceite oliva", "Aceite girasol", "Lechuga", "Pepino", "Manzana", 
    "Mango", "Ajo", "Perejil", "Pimiento de Padrón", "Tomate cherry", 
    "Tomate pera", "Champiñones", "Zanahorias enteras", "Puerro", "Pimiento", 
    "Limón", "Patata", "Cebolla", "Huevos", "Harina", 
    "Vinagre balsámico", "Laurel", "Cayena", "Pimentón dulce", "Sal marina", 
    "Sazonador paella", "Sirope de caña", "Miel de flores", "Nata cocinar", "Salsa teriyaki", 
    "Atún", "Papel film", "Papel aluminio", "Tomate frito", "Aceitunas", 
    "Variantes ensaladilla", "Espárragos", "Zanahoria tiras", "Mermelada", "Salsa Cesar", 
    "Salsa Yogurt", "Mayonesa", "Ketchup", "Avecrem", "Arroz redondo", 
    "Pasta", "Sal fina", "Azúcar", "Rosquillas", "Pan hamburguesa", 
    "Tostadas Camembert", "Tostadas Salmorejo", "Pipas calabaza", "Pipas girasol", "Nueces", 
    "Frutas deshidratadas", "Almendras", "Galleta Lotus", "Galleta María", "Galleta molida", 
    "Caramelo líquido", "Chocolate líquido", "Grissini(palos jamón)", "Canela", "Natillas", 
    "Mousse de chocolate", "Flan huevo", "Flan café", "Nata montada", "Rulo de cabra", 
    "Quesos ...", "Queso Burrata", "Queso Camembert", "Queso rallado", "Salsa trufa", 
    "Alioli", "Jamón serrano", "Jamón York", "Bacon cheapsbacon", "Bacon hamburguesa", 
    "Chorizo", "Jamón ibérico", "Fua", "Entrecot", "Presa ibérica", 
    "Pechuga", "Helado Vainilla", "Helado leche", "Helado chocolate", "Helado turrón", 
    "Helado limón", "Tarta de whisky", "Contessa", "Bolas de chocolate", "Barras de chocolate", 
    "Pan sin gluten", "Sardina ahumada", "Boquerón ahumado", "Chopitos plancha", "Lubina", 
    "Dorada", "Almejas", "Mejillones", "Croquetas jamón", "Chuletillas", 
    "Alcachofas", "Mejillones paella", "Bolsa de basura", "Mistol", "Limpia critales", 
    "Aclarador vasos", "Friegasuelos"
];

        // --- 2. LÓGICA DE ESTADO ---
        let estado = JSON.parse(localStorage.getItem('lista_compra_estado')) || 
            productosBase.map((p, i) => ({ id: i, nombre: p, check: false, cantidad: "" }));

        const contenedor = document.getElementById('lista-productos');
        let toastTimeout; // Variable para controlar el tiempo del Toast

        function guardarYRenderizar() {
            localStorage.setItem('lista_compra_estado', JSON.stringify(estado));
            renderizar();
        }

        // --- 3. RENDERIZADO DE LA INTERFAZ ---
        function renderizar() {
            contenedor.innerHTML = estado.map(prod => `
                <div class="flex items-center justify-between p-3 rounded-xl border transition-all ${prod.check ? 'border-blue-500 bg-blue-50/50' : 'border-gray-200 bg-gray-50'}">
                    
                    <label class="flex items-center gap-3 flex-1 cursor-pointer select-none py-1">
                        <input type="checkbox" ${prod.check ? 'checked' : ''} 
                               onchange="toggleCheck(${prod.id})" 
                               class="w-6 h-6 text-blue-600 border-gray-300 rounded focus:ring-blue-500 transition-colors">
                        <span class="text-lg font-medium ${prod.check ? 'text-blue-900' : 'text-gray-700'}">${prod.nombre}</span>
                    </label>
                    
                    <div class="flex items-center ml-2">
                        <input type="number" 
                               inputmode="numeric"
                               placeholder="Cant." 
                               value="${prod.cantidad}" 
                               oninput="cambiarCantidad(${prod.id}, this.value)"
                               class="w-16 p-2 text-center text-lg bg-white border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 shadow-sm ${prod.check ? 'opacity-100' : 'opacity-50'} transition-opacity">
                    </div>
                </div>
            `).join('');
        }

        // --- 4. ACCIONES DE USUARIO ---
        function toggleCheck(id) {
            const prod = estado.find(p => p.id === id);
            prod.check = !prod.check;
            
            if(prod.check) {
                setTimeout(() => {
                   const input = contenedor.children[id].querySelector('input[type="number"]');
                   if(input) input.focus();
                }, 50);
            }
            guardarYRenderizar();
        }

        function cambiarCantidad(id, valor) {
            const prod = estado.find(p => p.id === id);
            prod.cantidad = valor;
            
            if (valor !== "" && !prod.check) {
                prod.check = true;
                guardarYRenderizar(); 
            } else {
                localStorage.setItem('lista_compra_estado', JSON.stringify(estado)); 
            }
        }

        function limpiarLista() {
            // Aquí seguimos usando confirm() porque requiere interacción (Aceptar/Cancelar),
            // pero el resultado visual lo damos con el Toast
            if(confirm("¿Seguro que quieres desmarcar todo?")) {
                estado.forEach(p => {
                    p.check = false;
                    p.cantidad = "";
                });
                guardarYRenderizar();
                mostrarToast("Lista reiniciada", "🧹");
            }
        }

        // --- 5. LÓGICA DEL TOAST ---
        function mostrarToast(mensaje, icono = "✅") {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').innerText = mensaje;
            document.getElementById('toast-icon').innerText = icono;
            
            // Si hay un toast ejecutándose, limpiamos el temporizador para que no se oculte antes de tiempo
            clearTimeout(toastTimeout);
            
            // Animación de entrada
            toast.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            // Animación de salida a los 2.5 segundos
            toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
            }, 2500);
        }

        // --- 6. EXPORTAR AL PORTAPAPELES ---
        function copiarAlPortapapeles() {
            const seleccionados = estado.filter(p => p.check);
            
            if (seleccionados.length === 0) {
                mostrarToast("No has marcado nada", "⚠️");
                return;
            }

            const textoFormateado = seleccionados
                .map(p => `• ${p.nombre}${p.cantidad ? ` (quedan ${p.cantidad})` : ''}`)
                .join('\n');

            navigator.clipboard.writeText(textoFormateado)
                .then(() => {
                    mostrarToast("¡Lista copiada!", "📋");
                })
                .catch(err => {
                    mostrarToast("Error al copiar", "❌");
                    console.error("Error: ", err);
                });
        }

        // --- 7. INICIO ---
        renderizar();
    </script>
</body>
</html>
